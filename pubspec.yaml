name: assignment
description: "Card and passbook scanner using OCR + manual parsing."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # OCR engine (allowed by the assignment).
  google_mlkit_text_recognition: ^0.13.0

  # Camera + gallery picker. Simpler than the raw `camera` plugin
  # and enough for the "open camera and scan" requirement.
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
